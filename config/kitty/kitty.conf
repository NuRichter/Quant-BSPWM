# ╔═══════════════════════════════════════════════════════════════╗
# ║  Quant BSPWM - Kitty Terminal Configuration                  ║
# ║  Trilingual: English / Indonesian / Japanese                  ║
# ╚═══════════════════════════════════════════════════════════════╝

# ── Typography ────────────────────────────────────────────────────

font_family         JetBrainsMono Nerd Font
bold_font           JetBrainsMono Nerd Font Bold
italic_font         JetBrainsMono Nerd Font Italic
bold_italic_font    JetBrainsMono Nerd Font Bold Italic

font_size           11.0
adjust_line_height  120%
adjust_column_width 0

# CJK font rendering (Japanese support)
# Kitty auto-detects CJK; ensure Noto Sans CJK is installed
symbol_map U+3000-U+303F,U+3040-U+309F,U+30A0-U+30FF Noto Sans CJK JP
symbol_map U+FF00-U+FFEF Noto Sans CJK JP
symbol_map U+4E00-U+9FAF Noto Sans CJK JP
symbol_map U+2E80-U+2EFF Noto Sans CJK JP
symbol_map U+31F0-U+31FF Noto Sans CJK JP
symbol_map U+3200-U+32FF Noto Sans CJK JP
symbol_map U+FE30-U+FE4F Noto Sans CJK JP
symbol_map U+F900-U+FAFF Noto Sans CJK JP

# Emoji
symbol_map U+1F600-U+1F64F Noto Color Emoji
symbol_map U+1F300-U+1F5FF Noto Color Emoji
symbol_map U+1F680-U+1F6FF Noto Color Emoji
symbol_map U+1F1E0-U+1F1FF Noto Color Emoji
symbol_map U+2702-U+27B0 Noto Color Emoji
symbol_map U+FE00-U+FE0F Noto Color Emoji
symbol_map U+1F900-U+1F9FF Noto Color Emoji
symbol_map U+200D Noto Color Emoji

disable_ligatures   never
box_drawing_scale   0.001, 1, 1.5, 2

# ── Window ────────────────────────────────────────────────────────

remember_window_size    no
initial_window_width    120c
initial_window_height   35c

window_padding_width    12 16
placement_strategy      center

background_opacity      0.92
dynamic_background_opacity yes

confirm_os_window_close 0

hide_window_decorations yes
window_border_width     1pt
draw_minimal_borders    yes
active_border_color     #f5c2e7
inactive_border_color   #1e1c2a

# ── Tab Bar ───────────────────────────────────────────────────────

tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_margin_width    4.0
tab_bar_margin_height   4.0 0.0
tab_bar_min_tabs        2

active_tab_foreground   #16141f
active_tab_background   #f5c2e7
active_tab_font_style   bold
inactive_tab_foreground #908caa
inactive_tab_background #1e1c2a
inactive_tab_font_style normal
tab_bar_background      #0e0c15

tab_title_template      "{fmt.fg.pink}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"

# ── Cursor ────────────────────────────────────────────────────────

cursor                  #f5c2e7
cursor_text_color       #16141f
cursor_shape            beam
cursor_beam_thickness   1.5
cursor_blink_interval   0.5
cursor_stop_blinking_after 15.0

# ── Scrollback ────────────────────────────────────────────────────

scrollback_lines        10000
scrollback_pager        less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# ── Mouse ─────────────────────────────────────────────────────────

mouse_hide_wait         3.0
url_color               #89b4fa
url_style               curly
open_url_with           default
url_prefixes            http https file ftp gemini irc gopher mailto news git
detect_urls             yes
copy_on_select          clipboard
strip_trailing_spaces   smart

# ── Audio ─────────────────────────────────────────────────────────

enable_audio_bell       no
visual_bell_duration    0.0
bell_on_tab             "  "

# ── Color Scheme: Quant ──────────────────────────────────────────

foreground              #e0def4
background              #16141f
selection_foreground    #16141f
selection_background    #f5c2e7

# Black
color0                  #0e0c15
color8                  #2a2837

# Red
color1                  #f38ba8
color9                  #f5c2e7

# Green
color2                  #a6e3a1
color10                 #94e2d5

# Yellow
color3                  #f9e2af
color11                 #fab387

# Blue
color4                  #89b4fa
color12                 #c4a7e7

# Magenta
color5                  #cba6f7
color13                 #f5c2e7

# Cyan
color6                  #94e2d5
color14                 #89b4fa

# White
color7                  #e0def4
color15                 #f2f0ff

# Additional colors
mark1_foreground        #16141f
mark1_background        #89b4fa
mark2_foreground        #16141f
mark2_background        #c4a7e7
mark3_foreground        #16141f
mark3_background        #f5c2e7

# ── Keyboard Shortcuts ───────────────────────────────────────────

map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0
map ctrl+shift+f5       load_config_file
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+l        next_layout
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+n        new_os_window_with_cwd
map ctrl+shift+f        show_scrollback

# ── Advanced ─────────────────────────────────────────────────────

shell                   .
editor                  nvim
close_on_child_death    no
allow_remote_control    yes
listen_on              unix:@kitty
update_check_interval   0
clipboard_control       write-clipboard write-primary read-clipboard-ask read-primary-ask
allow_hyperlinks        yes
shell_integration       enabled
term                    xterm-kitty
