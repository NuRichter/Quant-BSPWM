# Quant BSPWM - Alacritty Configuration (TOML format)

[env]
TERM = "xterm-256color"

[window]
padding = { x = 14, y = 14 }
dynamic_padding = true
decorations = "None"
opacity = 0.92
blur = true
startup_mode = "Windowed"
dynamic_title = true

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }
size = 11.0
offset = { x = 0, y = 2 }

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 500
blink_timeout = 15
thickness = 0.15

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[colors.primary]
background = "#16141f"
foreground = "#e0def4"
dim_foreground = "#908caa"
bright_foreground = "#f2f0ff"

[colors.cursor]
text = "#16141f"
cursor = "#f5c2e7"

[colors.vi_mode_cursor]
text = "#16141f"
cursor = "#c4a7e7"

[colors.search.matches]
foreground = "#16141f"
background = "#f9e2af"

[colors.search.focused_match]
foreground = "#16141f"
background = "#f5c2e7"

[colors.hints.start]
foreground = "#16141f"
background = "#f9e2af"

[colors.hints.end]
foreground = "#16141f"
background = "#89b4fa"

[colors.footer_bar]
foreground = "#16141f"
background = "#c4a7e7"

[colors.selection]
text = "#16141f"
background = "#f5c2e7"

[colors.normal]
black   = "#0e0c15"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#94e2d5"
white   = "#e0def4"

[colors.bright]
black   = "#2a2837"
red     = "#f5c2e7"
green   = "#94e2d5"
yellow  = "#fab387"
blue    = "#c4a7e7"
magenta = "#f5c2e7"
cyan    = "#89b4fa"
white   = "#f2f0ff"

[colors.dim]
black   = "#0e0c15"
red     = "#d97490"
green   = "#8cc589"
yellow  = "#d7c494"
blue    = "#7199d6"
magenta = "#ad8fd6"
cyan    = "#7dc4b5"
white   = "#bfbdd4"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "Equals"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "SpawnNewInstance"
