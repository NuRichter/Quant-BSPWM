#  ╔═══════════════════════════════════════════════════════════════╗
#  ║  Quant BSPWM - Tmux Configuration                           ║
#  ║  Prefix: C-a  |  TPM plugin manager                         ║
#  ╚═══════════════════════════════════════════════════════════════╝

# ── Prefix ────────────────────────────────────────────────────────

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",alacritty:RGB"
set -ag terminal-overrides ",kitty:RGB"

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g escape-time 0
set -g focus-events on
set -g status-interval 5
setw -g aggressive-resize on
setw -g mode-keys vi

# Window title
set -g set-titles on
set -g set-titles-string "#S / #W"
setw -g automatic-rename on

# ── Keybindings ───────────────────────────────────────────────────

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Split panes (intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Toggle synchronize panes
bind S setw synchronize-panes

# Kill pane/window
bind x kill-pane
bind X kill-window
bind Q confirm-before -p "Kill session #S? (y/n)" kill-session

# Copy mode (vi)
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -i -sel clipboard"
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel

# Session management
bind s choose-session
bind n command-prompt -p "New session:" "new-session -s '%%'"

# Toggle status bar
bind b set -g status

# ── Appearance (Quant Palette) ────────────────────────────────────

# Pane borders
set -g pane-border-style "fg=#2a2837"
set -g pane-active-border-style "fg=#f5c2e7"

# Message style
set -g message-style "bg=#1e1c2a,fg=#f5c2e7"
set -g message-command-style "bg=#1e1c2a,fg=#c4a7e7"

# Mode (selection) style
setw -g mode-style "bg=#2a2837,fg=#f5c2e7"

# Clock
setw -g clock-mode-colour "#f5c2e7"

# ── Status Bar ────────────────────────────────────────────────────

set -g status on
set -g status-position top
set -g status-justify centre
set -g status-style "bg=#0e0c15,fg=#e0def4"

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=#16141f,bg=#f5c2e7,bold]  #S #[fg=#f5c2e7,bg=#1e1c2a]#[fg=#c4a7e7,bg=#1e1c2a] #I:#P #[fg=#1e1c2a,bg=#0e0c15]"

# Right: date + time
set -g status-right-length 60
set -g status-right "#[fg=#1e1c2a,bg=#0e0c15]#[fg=#908caa,bg=#1e1c2a] %Y.%m.%d #[fg=#f5c2e7,bg=#1e1c2a]#[fg=#16141f,bg=#f5c2e7,bold] %H:%M "

# Window tabs
setw -g window-status-format "#[fg=#6e6a86] #I #W "
setw -g window-status-current-format "#[fg=#0e0c15,bg=#0e0c15]#[fg=#f5c2e7,bg=#2a2837,bold] #I #W #[fg=#2a2837,bg=#0e0c15]"
setw -g window-status-separator ""
setw -g window-status-activity-style "fg=#fab387"
setw -g window-status-bell-style "fg=#f38ba8"

# ── Plugins (TPM) ────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Bootstrap TPM (auto-install)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/bin/tpm'
