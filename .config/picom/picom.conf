#  ╔═══════════════════════════════════════════════════════════════╗
#  ║  Quant BSPWM - Picom Compositor                              ║
#  ║  Optimized for NVIDIA (RTX 5060 Ti / 5070 Ti)                ║
#  ╚═══════════════════════════════════════════════════════════════╝

# ── Backend ───────────────────────────────────────────────────────

backend = "glx";
vsync = true;
glx-no-stencil = true;
glx-copy-from-front = false;
glx-no-rebind-pixmap = true;
use-damage = true;
xrender-sync-fence = true;

# ── Shadows ───────────────────────────────────────────────────────

shadow = true;
shadow-radius = 18;
shadow-opacity = 0.55;
shadow-offset-x = -18;
shadow-offset-y = -18;

shadow-color = "#0e0c15";

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "class_g = 'Dunst'",
    "class_g = 'slop'",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

# ── Fading ────────────────────────────────────────────────────────

fading = true;
fade-in-step = 0.035;
fade-out-step = 0.035;
fade-delta = 6;
no-fading-openclose = false;
no-fading-destroyed-argb = false;

fade-exclude = [
    "class_g = 'slop'"
];

# ── Opacity ───────────────────────────────────────────────────────

inactive-opacity = 0.92;
frame-opacity = 1.0;
inactive-opacity-override = false;
active-opacity = 1.0;
focus-exclude = [
    "class_g = 'Cairo-clock'",
    "class_g = 'slop'"
];

opacity-rule = [
    "95:class_g = 'kitty' && focused",
    "85:class_g = 'kitty' && !focused",
    "95:class_g = 'Alacritty' && focused",
    "85:class_g = 'Alacritty' && !focused",
    "90:class_g = 'Rofi'",
    "95:class_g = 'Code'",
    "95:class_g = 'code-oss'",
    "100:class_g = 'firefox'",
    "100:class_g = 'Chromium'",
    "100:class_g = 'mpv'",
    "100:class_g = 'Gimp-2.10'",
    "100:fullscreen"
];

# ── Blur ──────────────────────────────────────────────────────────

blur-method = "dual_kawase";
blur-strength = 6;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur-kern = "3x3box";

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Rounded Corners ──────────────────────────────────────────────

corner-radius = 12;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
    "class_g = 'Dunst'"
];

# ── Animations (picom-ftlabs / picom-pijulius) ───────────────────

# Uncomment if using picom fork with animation support:
# animations = true;
# animation-stiffness = 200;
# animation-dampening = 25;
# animation-window-mass = 1;
# animation-clamping = true;
# animation-for-open-window = "zoom";
# animation-for-unmap-window = "zoom";
# animation-for-transient-window = "slide-up";
# animation-for-workspace-switch-in = "slide-right";
# animation-for-workspace-switch-out = "slide-left";

# ── Window Type Settings ─────────────────────────────────────────

wintypes:
{
    tooltip = {
        fade = true;
        shadow = true;
        opacity = 0.92;
        focus = true;
        full-shadow = false;
    };
    dock = {
        shadow = false;
        clip-shadow-above = true;
    };
    dnd = {
        shadow = false;
    };
    popup_menu = {
        opacity = 0.95;
        shadow = true;
    };
    dropdown_menu = {
        opacity = 0.95;
        shadow = true;
    };
    notification = {
        shadow = false;
        opacity = 0.95;
    };
};
