# Quant BSPWM - Environment Variables (systemd user session)

# Editor
EDITOR=nvim
VISUAL=nvim
SUDO_EDITOR=nvim

# XDG
XDG_CONFIG_HOME=$HOME/.config
XDG_DATA_HOME=$HOME/.local/share
XDG_STATE_HOME=$HOME/.local/state
XDG_CACHE_HOME=$HOME/.cache

# Input method (fcitx5)
GTK_IM_MODULE=fcitx
QT_IM_MODULE=fcitx
XMODIFIERS=@im=fcitx
SDL_IM_MODULE=fcitx

# Java fix for BSPWM
_JAVA_AWT_WM_NONREPARENTING=1

# Qt theming
QT_QPA_PLATFORMTHEME=qt5ct

# Starship
STARSHIP_CONFIG=$HOME/.config/starship/starship.toml

# Terminal
TERMINAL=kitty

# Browser
BROWSER=firefox
