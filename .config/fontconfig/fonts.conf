<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!--
    Quant BSPWM - Fontconfig
    Critical for trilingual rendering (English / Indonesian / Japanese)
    Priority: JetBrainsMono Nerd Font > Noto Sans CJK JP > Noto Color Emoji
-->
<fontconfig>

    <!-- Default rendering settings -->
    <match target="font">
        <edit name="antialias" mode="assign"><bool>true</bool></edit>
        <edit name="hinting" mode="assign"><bool>true</bool></edit>
        <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
        <edit name="rgba" mode="assign"><const>rgb</const></edit>
        <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
        <edit name="autohint" mode="assign"><bool>false</bool></edit>
        <edit name="embeddedbitmap" mode="assign"><bool>false</bool></edit>
    </match>

    <!-- Monospace fallback chain -->
    <alias>
        <family>monospace</family>
        <prefer>
            <family>JetBrainsMono Nerd Font</family>
            <family>Noto Sans Mono CJK JP</family>
            <family>Noto Color Emoji</family>
            <family>Symbols Nerd Font</family>
        </prefer>
    </alias>

    <!-- Sans-serif fallback chain -->
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Noto Sans</family>
            <family>Noto Sans CJK JP</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <!-- Serif fallback chain -->
    <alias>
        <family>serif</family>
        <prefer>
            <family>Noto Serif</family>
            <family>Noto Serif CJK JP</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <!-- System-ui mapping -->
    <alias>
        <family>system-ui</family>
        <prefer>
            <family>Noto Sans</family>
            <family>Noto Sans CJK JP</family>
        </prefer>
    </alias>

    <!--
        Japanese (JP) as default CJK variant.
        Without this, fontconfig may pick SC/TC/KR variants for shared
        CJK codepoints, resulting in incorrect glyph rendering for
        Japanese text.
    -->
    <match>
        <test name="lang" compare="contains"><string>ja</string></test>
        <test name="family"><string>Noto Sans CJK</string></test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Noto Sans CJK JP</string>
        </edit>
    </match>

    <match>
        <test name="lang" compare="contains"><string>ja</string></test>
        <test name="family"><string>Noto Serif CJK</string></test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Noto Serif CJK JP</string>
        </edit>
    </match>

    <!-- Force color emoji rendering -->
    <match target="font">
        <test name="family" qual="any">
            <string>Noto Color Emoji</string>
        </test>
        <edit name="scalable" mode="assign"><bool>true</bool></edit>
        <edit name="embeddedbitmap" mode="assign"><bool>true</bool></edit>
    </match>

    <!-- Reject bitmap fonts globally (except emoji) -->
    <selectfont>
        <rejectfont>
            <pattern>
                <patelt name="scalable"><bool>false</bool></patelt>
            </pattern>
        </rejectfont>
        <acceptfont>
            <pattern>
                <patelt name="family"><string>Noto Color Emoji</string></patelt>
            </pattern>
        </acceptfont>
    </selectfont>

    <!-- Generic aliases for web content -->
    <alias binding="same">
        <family>Helvetica</family>
        <accept><family>Noto Sans</family></accept>
    </alias>
    <alias binding="same">
        <family>Arial</family>
        <accept><family>Noto Sans</family></accept>
    </alias>
    <alias binding="same">
        <family>Times New Roman</family>
        <accept><family>Noto Serif</family></accept>
    </alias>
    <alias binding="same">
        <family>Courier New</family>
        <accept><family>JetBrainsMono Nerd Font</family></accept>
    </alias>

</fontconfig>
