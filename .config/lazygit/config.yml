# Quant BSPWM - Lazygit Configuration

gui:
  nerdFontsVersion: "3"
  showIcons: true
  showFileTree: true
  showListFooter: false
  showRandomTip: false
  showBottomLine: false
  showPanelJumps: true
  showCommandLog: false
  scrollHeight: 2
  scrollPastBottom: true
  mouseEvents: true
  border: rounded
  animateExplosion: true
  language: "en"
  theme:
    activeBorderColor:
      - "#f5c2e7"
      - bold
    inactiveBorderColor:
      - "#2a2837"
    searchingActiveBorderColor:
      - "#f9e2af"
      - bold
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#2a2837"
    selectedRangeBgColor:
      - "#2a2837"
    cherryPickedCommitBgColor:
      - "#94e2d5"
    cherryPickedCommitFgColor:
      - "#16141f"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#e0def4"
    markedBaseCommitBgColor:
      - "#f9e2af"
    markedBaseCommitFgColor:
      - "#16141f"

git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never
  merging:
    manualCommit: false
    args: ""
  log:
    order: topo-order
    showGraph: when-maximised
    showWholeGraph: false
  autoFetch: true
  autoRefresh: true
  branchLogCmd: "git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium {{branchName}} --"
  allBranchesLogCmd: "git log --graph --all --color=always --abbrev-commit --decorate --date=relative --pretty=medium"

os:
  editPreset: nvim

keybinding:
  universal:
    quit: q
    quit-alt1: <c-c>
    return: <esc>
    togglePanel: <tab>
    prevItem: <up>
    nextItem: <down>
    prevPage: ","
    nextPage: "."
    scrollUpMain: <pgup>
    scrollDownMain: <pgdown>
    gotoTop: "<"
    gotoBottom: ">"
    filteringMenu: <c-s>
    diffingMenu: W
    copyToClipboard: <c-o>
    openRecentRepos: <c-r>
    submitEditorText: <enter>
    extrasMenu: "@"
  status:
    checkForUpdate: u
    recentRepos: <enter>
    allBranchesLogGraph: a
  files:
    commitChanges: c
    commitChangesWithoutHook: w
    amendLastCommit: A
    commitChangesWithEditor: C
    fetch: f
    stashAllChanges: s
    viewStashOptions: S
    toggleStagedAll: a
    viewResetOptions: D
    ignoreFile: i
  branches:
    createPullRequest: o
    viewPullRequestOptions: O
    checkoutBranchByName: c
    forceCheckoutBranch: F
    rebaseBranch: r
    renameBranch: R
    mergeIntoCurrentBranch: M
    viewGitFlowOptions: i
    fastForward: f
    createTag: T
    pushTag: P
    setUpstream: u
    fetchRemote: f
  commits:
    squashDown: s
    renameCommit: r
    renameCommitWithEditor: R
    viewResetOptions: g
    markCommitAsFixup: f
    createFixupCommit: F
    squashAboveCommits: S
    moveDownCommit: <c-j>
    moveUpCommit: <c-k>
    amendToCommit: A
    pickCommit: p
    revertCommit: t
    cherryPickCopy: C
    pasteCommits: V
    tagCommit: T
    checkoutCommit: <space>
    resetCherryPick: <c-R>
    copyCommitMessageToClipboard: <c-y>
    openLogMenu: <c-l>
  stash:
    popStash: g
    renameStash: r
