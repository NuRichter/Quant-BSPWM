# Quant BSPWM - MPV Configuration

# ── Video ─────────────────────────────────────────────────────────

vo=gpu
gpu-api=vulkan
hwdec=auto-safe
profile=gpu-hq

# Scaling (high quality)
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes

# Debanding
deband=yes
deband-iterations=4
deband-threshold=48
deband-range=24
deband-grain=16

# HDR
tone-mapping=bt.2446a
target-colorspace-hint=yes

# ── Audio ─────────────────────────────────────────────────────────

ao=pipewire,pulse,alsa
volume=80
volume-max=150
audio-pitch-correction=yes

# ── Subtitles ─────────────────────────────────────────────────────

# CJK subtitle rendering
sub-auto=fuzzy
sub-font="Noto Sans CJK JP"
sub-font-size=42
sub-border-size=2.5
sub-border-color="#000000"
sub-shadow-offset=1
sub-shadow-color="#33000000"
sub-color="#FFFFFF"
sub-bold=yes
sub-ass-override=strip

# Subtitle languages (trilingual priority)
slang=jpn,jp,ja,ind,id,eng,en
alang=jpn,jp,ja,ind,id,eng,en

# ── OSD ───────────────────────────────────────────────────────────

osd-font="JetBrainsMono Nerd Font"
osd-font-size=28
osd-color="#f5c2e7"
osd-border-color="#16141f"
osd-border-size=2
osd-bar-align-y=0.95
osd-bar-h=2
osd-bar-w=75

osd-duration=2000
osd-playing-msg="${filename}"
osd-level=1

# ── Window ────────────────────────────────────────────────────────

force-window=immediate
keep-open=yes
autofit-larger=85%x85%
autofit-smaller=30%x30%
cursor-autohide=1000
title="${media-title} - mpv"
border=no

# ── Screenshots ───────────────────────────────────────────────────

screenshot-format=png
screenshot-png-compression=7
screenshot-template="%F-%P-%n"
screenshot-directory="~/Pictures/Screenshots"

# ── Cache ─────────────────────────────────────────────────────────

cache=yes
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=150MiB

# ── Input ─────────────────────────────────────────────────────────

save-position-on-quit=yes
watch-later-options-remove=pause
