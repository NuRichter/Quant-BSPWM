# Quant BSPWM - Yazi Theme

[manager]
cwd = { fg = "#c4a7e7" }

hovered         = { fg = "#16141f", bg = "#f5c2e7", bold = true }
preview_hovered = { underline = true }

find_keyword  = { fg = "#f9e2af", bold = true, italic = true, underline = true }
find_position = { fg = "#cba6f7", bg = "reset", italic = true }

marker_selected = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_copied   = { fg = "#f9e2af", bg = "#f9e2af" }
marker_cut      = { fg = "#f38ba8", bg = "#f38ba8" }

tab_active   = { fg = "#16141f", bg = "#f5c2e7", bold = true }
tab_inactive = { fg = "#908caa", bg = "#1e1c2a" }
tab_width    = 1

border_symbol = " "
border_style  = { fg = "#2a2837" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#1e1c2a", bg = "#1e1c2a" }

mode_normal = { fg = "#16141f", bg = "#f5c2e7", bold = true }
mode_select = { fg = "#16141f", bg = "#a6e3a1", bold = true }
mode_unset  = { fg = "#16141f", bg = "#f38ba8", bold = true }

progress_label  = { fg = "#e0def4", bold = true }
progress_normal = { fg = "#2a2837", bg = "#1e1c2a" }
progress_error  = { fg = "#f38ba8", bg = "#1e1c2a" }

permissions_t = { fg = "#89b4fa" }
permissions_r = { fg = "#a6e3a1" }
permissions_w = { fg = "#f38ba8" }
permissions_x = { fg = "#f9e2af" }
permissions_s = { fg = "#6e6a86" }

[input]
border   = { fg = "#c4a7e7" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "#c4a7e7" }
active   = { fg = "#cba6f7" }
inactive = {}

[tasks]
border  = { fg = "#c4a7e7" }
title   = {}
hovered = { underline = true }

[which]
mask            = { bg = "#1e1c2a" }
cand            = { fg = "#94e2d5" }
rest            = { fg = "#6e6a86" }
desc            = { fg = "#cba6f7" }
separator       = "  "
separator_style = { fg = "#2a2837" }

[help]
on      = { fg = "#cba6f7" }
exec    = { fg = "#94e2d5" }
desc    = { fg = "#908caa" }
hovered = { bg = "#2a2837", bold = true }
footer  = { fg = "#e0def4", bg = "#1e1c2a" }

[filetype]
rules = [
    # Media
    { mime = "image/*", fg = "#94e2d5" },
    { mime = "video/*", fg = "#f9e2af" },
    { mime = "audio/*", fg = "#fab387" },

    # Archives
    { mime = "application/zip",             fg = "#cba6f7" },
    { mime = "application/gzip",            fg = "#cba6f7" },
    { mime = "application/x-tar",           fg = "#cba6f7" },
    { mime = "application/x-bzip2",         fg = "#cba6f7" },
    { mime = "application/x-7z-compressed", fg = "#cba6f7" },
    { mime = "application/x-rar",           fg = "#cba6f7" },

    # Documents
    { mime = "application/pdf",  fg = "#f38ba8" },
    { mime = "application/json", fg = "#f9e2af" },
    { mime = "application/xml",  fg = "#fab387" },

    # Fallback
    { name = "*", fg = "#e0def4" },
    { name = "*/", fg = "#89b4fa" },
]
