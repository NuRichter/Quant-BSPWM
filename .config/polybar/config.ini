;  ║  Quant BSPWM - Polybar Configuration                        ║
;  ║  Professional pastel-dark panel                              ║
;  ╚═══════════════════════════════════════════════════════════════╝

; ── Colors ─────────────────────────────────────────────────────────

[colors]
bg          = #e6161420
bg-alt      = #cc1e1c2a
bg-module   = #cc2a2837
fg          = #e0def4
fg-dim      = #6e6a86
fg-muted    = #908caa

pink        = #f5c2e7
rose        = #f38ba8
lavender    = #c4a7e7
mauve       = #cba6f7
blue        = #89b4fa
teal        = #94e2d5
peach       = #fab387
yellow      = #f9e2af
green       = #a6e3a1
red         = #f38ba8

transparent = #00000000

; ── Global Settings ────────────────────────────────────────────────

[settings]
screenchange-reload = true
pseudo-transparency = false
compositing-background = over
compositing-foreground = source
compositing-overline = over
compositing-underline = over
compositing-border = over

; ── Primary Bar ────────────────────────────────────────────────────

[bar/quant-primary]
monitor = ${env:MONITOR:}
width = 99%
height = 32
offset-x = 0.5%
offset-y = 4
radius = 12
fixed-center = true

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 2
line-color = ${colors.pink}

border-size = 0
border-color = ${colors.transparent}

padding-left = 1
padding-right = 2
module-margin-left = 1
module-margin-right = 1

; Typography (requires Nerd Font + CJK font)
font-0 = "JetBrainsMono Nerd Font:size=9;3"
font-1 = "JetBrainsMono Nerd Font:size=13;4"
font-2 = "Noto Sans CJK JP:size=10;3"
font-3 = "Noto Color Emoji:scale=10;3"
font-4 = "JetBrainsMono Nerd Font:style=Bold:size=9;3"

modules-left = bspwm xwindow
modules-center = date
modules-right = media gpu ime cpu memory filesystem pulseaudio battery network tray

wm-restack = bspwm
override-redirect = false

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; ── Secondary Bar ──────────────────────────────────────────────────

[bar/quant-secondary]
inherit = bar/quant-primary
modules-left = bspwm
modules-center = date
modules-right = pulseaudio network

tray-position = none

; ── Module: BSPWM Workspaces ──────────────────────────────────────

[module/bspwm]
type = internal/bspwm

; Kanji workspace labels
label-focused = %name%
label-focused-foreground = ${colors.pink}
label-focused-background = ${colors.bg-module}
label-focused-underline = ${colors.pink}
label-focused-padding = 2
label-focused-font = 3

label-occupied = %name%
label-occupied-foreground = ${colors.lavender}
label-occupied-padding = 2
label-occupied-font = 3

label-urgent = %name%
label-urgent-foreground = ${colors.rose}
label-urgent-background = ${colors.bg-alt}
label-urgent-underline = ${colors.rose}
label-urgent-padding = 2
label-urgent-font = 3

label-empty = %name%
label-empty-foreground = ${colors.fg-dim}
label-empty-padding = 2
label-empty-font = 3

label-separator = " "

pin-workspaces = true
inline-mode = false
enable-click = true
enable-scroll = true
reverse-scroll = true

format-padding = 1

; ── Module: Window Title ──────────────────────────────────────────

[module/xwindow]
type = internal/xwindow

label = %title%
label-maxlen = 50
label-foreground = ${colors.fg-muted}
label-font = 1

format-padding = 2

; ── Module: Date/Time ─────────────────────────────────────────────

[module/date]
type = internal/date
interval = 1

date = "%Y.%m.%d"
date-alt = "%A, %d %B %Y"
time = "%H:%M"
time-alt = "%H:%M:%S"

format-prefix = " "
format-prefix-foreground = ${colors.mauve}
format-prefix-font = 2

label = %date%  %time%
label-foreground = ${colors.fg}
label-font = 5

format-padding = 2

; ── Module: CPU ───────────────────────────────────────────────────

[module/cpu]
type = internal/cpu
interval = 2

format-prefix = " "
format-prefix-foreground = ${colors.blue}
format-prefix-font = 2

label = %percentage:2%%
label-foreground = ${colors.fg}

warn-percentage = 80

format-warn-prefix = " "
format-warn-prefix-foreground = ${colors.rose}
label-warn = %percentage:2%%
label-warn-foreground = ${colors.rose}

; ── Module: Memory ────────────────────────────────────────────────

[module/memory]
type = internal/memory
interval = 3

format-prefix = " "
format-prefix-foreground = ${colors.lavender}
format-prefix-font = 2

label = %percentage_used:2%%
label-foreground = ${colors.fg}

warn-percentage = 85
format-warn-prefix = " "
format-warn-prefix-foreground = ${colors.rose}
label-warn = %percentage_used:2%%
label-warn-foreground = ${colors.rose}

; ── Module: Filesystem ────────────────────────────────────────────

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /

format-mounted-prefix = "󰋊 "
format-mounted-prefix-foreground = ${colors.teal}
format-mounted-prefix-font = 2

label-mounted = %percentage_used%%
label-mounted-foreground = ${colors.fg}

label-unmounted = %mountpoint% N/A
label-unmounted-foreground = ${colors.fg-dim}

; ── Module: PulseAudio ────────────────────────────────────────────

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix-font = 2

label-volume = %percentage%%
label-volume-foreground = ${colors.fg}

format-volume = <ramp-volume> <label-volume>

ramp-volume-0 = 
ramp-volume-0-foreground = ${colors.green}
ramp-volume-1 = 
ramp-volume-1-foreground = ${colors.peach}
ramp-volume-2 = 
ramp-volume-2-foreground = ${colors.rose}
ramp-volume-font = 2

label-muted = 󰖁 muted
label-muted-foreground = ${colors.fg-dim}

click-right = pavucontrol

; ── Module: Battery ───────────────────────────────────────────────

[module/battery]
type = internal/battery

full-at = 98
low-at = 15
battery = BAT0
adapter = ADP1
poll-interval = 30

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%
label-charging-foreground = ${colors.fg}

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
label-discharging-foreground = ${colors.fg}

format-full-prefix = "󰁹 "
format-full-prefix-foreground = ${colors.green}
format-full-prefix-font = 2
label-full = full
label-full-foreground = ${colors.green}

format-low = <animation-low> <label-low>
label-low = %percentage%%!
label-low-foreground = ${colors.rose}

ramp-capacity-0 = 󰁺
ramp-capacity-0-foreground = ${colors.rose}
ramp-capacity-1 = 󰁻
ramp-capacity-1-foreground = ${colors.rose}
ramp-capacity-2 = 󰁼
ramp-capacity-2-foreground = ${colors.peach}
ramp-capacity-3 = 󰁽
ramp-capacity-3-foreground = ${colors.peach}
ramp-capacity-4 = 󰁾
ramp-capacity-4-foreground = ${colors.green}
ramp-capacity-5 = 󰁿
ramp-capacity-5-foreground = ${colors.green}
ramp-capacity-6 = 󰂀
ramp-capacity-6-foreground = ${colors.green}
ramp-capacity-7 = 󰂁
ramp-capacity-7-foreground = ${colors.green}
ramp-capacity-8 = 󰂂
ramp-capacity-8-foreground = ${colors.green}
ramp-capacity-font = 2

animation-charging-0 = 󰢜
animation-charging-1 = 󰂆
animation-charging-2 = 󰂇
animation-charging-3 = 󰂈
animation-charging-4 = 󰢝
animation-charging-5 = 󰂉
animation-charging-6 = 󰢞
animation-charging-foreground = ${colors.teal}
animation-charging-framerate = 750
animation-charging-font = 2

animation-low-0 = 󰁺
animation-low-1 = 󰁻
animation-low-foreground = ${colors.rose}
animation-low-framerate = 500
animation-low-font = 2

; ── Module: Network ───────────────────────────────────────────────

[module/network]
type = internal/network
interface-type = wireless
interval = 5

format-connected = <ramp-signal> <label-connected>
label-connected = %essid%
label-connected-foreground = ${colors.fg}
label-connected-maxlen = 15

format-disconnected-prefix = "󰤭 "
format-disconnected-prefix-foreground = ${colors.rose}
format-disconnected-prefix-font = 2
label-disconnected = offline
label-disconnected-foreground = ${colors.fg-dim}

ramp-signal-0 = 󰤟
ramp-signal-1 = 󰤢
ramp-signal-2 = 󰤥
ramp-signal-3 = 󰤨
ramp-signal-foreground = ${colors.blue}
ramp-signal-font = 2

; ── Module: Network (Wired) ───────────────────────────────────────

[module/network-wired]
type = internal/network
interface-type = wired
interval = 5

format-connected-prefix = "󰈀 "
format-connected-prefix-foreground = ${colors.teal}
format-connected-prefix-font = 2
label-connected = %local_ip%
label-connected-foreground = ${colors.fg}

format-disconnected = ""

; ── Module: Media Player ─────────────────────────────────────────

[module/media]
type = custom/script
exec = $HOME/scripts/quant-polybar-media.sh
interval = 3
tail = false

label = %output%
label-foreground = ${colors.fg-muted}
label-maxlen = 40

click-left = playerctl play-pause
click-right = playerctl next
scroll-up = playerctl position 5+
scroll-down = playerctl position 5-

; ── Module: GPU (NVIDIA) ─────────────────────────────────────────

[module/gpu]
type = custom/script
exec = $HOME/scripts/quant-polybar-gpu.sh
interval = 5
tail = false

label = %output%
label-foreground = ${colors.fg}

; ── Module: Input Method ──────────────────────────────────────────

[module/ime]
type = custom/script
exec = $HOME/scripts/quant-ime-status.sh
interval = 2
tail = false

format-prefix = "󰗊 "
format-prefix-foreground = ${colors.peach}
format-prefix-font = 2

label = %output%
label-foreground = ${colors.fg}

click-left = $HOME/scripts/quant-ime-toggle.sh

; ── Module: System Tray ───────────────────────────────────────────

[module/tray]
type = internal/tray

tray-size = 65%
tray-spacing = 6
tray-padding = 2
tray-foreground = ${colors.fg}
